<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz History - QuizMaster Pro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="history-body">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

        <div class="container">

            <a href="dashboard.html"
                class="navbar-brand fw-bold">

                <i class="bi bi-patch-question-fill text-warning"></i>
                QuizMaster Pro

            </a>

            <div class="d-flex gap-2">

                <a href="quiz.html"
                    class="btn btn-warning btn-sm fw-semibold">

                    <i class="bi bi-controller"></i>
                    Start Quiz

                </a>

                <a href="dashboard.html"
                    class="btn btn-outline-light btn-sm">

                    <i class="bi bi-grid-fill"></i>
                    Dashboard

                </a>

            </div>

        </div>

    </nav>

    <!-- SECTION -->
    <section class="history-section">

        <div class="container">

            <!-- TOP -->
            <div class="history-top mb-4">

                <div>

                    <h2 class="fw-bold mb-1">
                        Quiz History
                    </h2>

                    <p class="text-muted mb-0">
                        Track your quiz attempts and performance
                    </p>

                </div>

                <div class="history-actions">

                    <button
                        class="btn btn-outline-danger"
                        id="clearHistoryBtn">

                        <i class="bi bi-trash-fill"></i>
                        Clear History

                    </button>

                </div>

            </div>

            <!-- STATS -->
            <div class="row g-4 mb-5">

                <!-- TOTAL -->
                <div class="col-md-3">

                    <div class="history-stat-card">

                        <div class="history-icon bg-primary">

                            <i class="bi bi-controller"></i>

                        </div>

                        <div>

                            <h3 class="fw-bold mb-0"
                                id="historyTotalQuiz">

                                0

                            </h3>

                            <small class="text-muted">
                                Total Quizzes
                            </small>

                        </div>

                    </div>

                </div>

                <!-- PASS -->
                <div class="col-md-3">

                    <div class="history-stat-card">

                        <div class="history-icon bg-success">

                            <i class="bi bi-check-circle-fill"></i>

                        </div>

                        <div>

                            <h3 class="fw-bold mb-0"
                                id="historyPassedQuiz">

                                0

                            </h3>

                            <small class="text-muted">
                                Passed
                            </small>

                        </div>

                    </div>

                </div>

                <!-- FAIL -->
                <div class="col-md-3">

                    <div class="history-stat-card">

                        <div class="history-icon bg-danger">

                            <i class="bi bi-x-circle-fill"></i>

                        </div>

                        <div>

                            <h3 class="fw-bold mb-0"
                                id="historyFailedQuiz">

                                0

                            </h3>

                            <small class="text-muted">
                                Failed
                            </small>

                        </div>

                    </div>

                </div>

                <!-- AVERAGE -->
                <div class="col-md-3">

                    <div class="history-stat-card">

                        <div class="history-icon bg-warning">

                            <i class="bi bi-bar-chart-fill"></i>

                        </div>

                        <div>

                            <h3 class="fw-bold mb-0"
                                id="historyAverageScore">

                                0%

                            </h3>

                            <small class="text-muted">
                                Average Score
                            </small>

                        </div>

                    </div>

                </div>

            </div>

            <!-- FILTER -->
            <div class="history-filter-card mb-4">

                <div class="row g-3 align-items-center">

                    <div class="col-md-4">

                        <input
                            type="text"
                            id="searchHistory"
                            class="form-control"
                            placeholder="Search quiz..."
                        >

                    </div>

                    <div class="col-md-4">

                        <select
                            class="form-select"
                            id="filterStatus">

                            <option value="all">
                                All Results
                            </option>

                            <option value="passed">
                                Passed
                            </option>

                            <option value="failed">
                                Failed
                            </option>

                        </select>

                    </div>

                    <div class="col-md-4 text-md-end">

                        <span class="text-muted">

                            Total Records:

                            <strong id="totalRecords">
                                0
                            </strong>

                        </span>

                    </div>

                </div>

            </div>

            <!-- TABLE -->
            <div class="history-table-card">

                <div class="table-responsive">

                    <table class="table align-middle mb-0">

                        <thead>

                            <tr>

                                <th>#</th>
                                <th>Quiz</th>
                                <th>Score</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th>Action</th>

                            </tr>

                        </thead>

                        <tbody id="historyTableBody">

                            <tr>

                                <td colspan="6"
                                    class="text-center py-5 text-muted">

                                    No history available

                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </section>

    <div class="mobile-bottom-nav d-lg-none">
        <a href="dashboard.html">
            <i class="bi bi-grid-fill"></i>
            <span>Dashboard</span>
        </a>
        <a href="quiz.html">
            <i class="bi bi-controller"></i>
            <span>Quiz</span>
        </a>
        <a href="flashcards.html">
            <i class="bi bi-stack"></i>
            <span>Flashcards</span>
        </a>
        <a href="history.html" class="active">
            <i class="bi bi-clock-history"></i>
            <span>History</span>
        </a>
        <a href="settings.html">
            <i class="bi bi-gear-fill"></i>
            <span>Settings</span>
        </a>
    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/history-page.js"></script>

</body>
</html>
