<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Session - QuizMaster Pro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="quiz-body">

    <!-- TOPBAR -->
    <nav class="navbar navbar-dark bg-dark shadow-sm px-3">

        <div class="container-fluid">

            <a href="dashboard.html"
                class="navbar-brand fw-bold">

                <i class="bi bi-patch-question-fill text-warning"></i>
                QuizMaster Pro

            </a>

            <div class="d-flex align-items-center gap-3">

                <!-- TIMER -->
                <div class="quiz-timer">

                    <i class="bi bi-stopwatch-fill"></i>

                    <span id="timer">
                        10:00
                    </span>

                </div>

                <!-- USER -->
                <div class="quiz-user">

                    <i class="bi bi-person-circle"></i>

                    <span id="quizUserName">
                        Student
                    </span>

                </div>

            </div>

        </div>

    </nav>

    <!-- QUIZ -->
    <section class="quiz-section">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-lg-9">

                    <div class="quiz-card">

                        <!-- HEADER -->
                        <div class="quiz-header">

                            <div>

                                <small class="text-muted">
                                    Question
                                </small>

                                <h5 class="fw-bold mb-0">
                                    <span id="currentQuestionNumber">
                                        1
                                    </span>

                                    of

                                    <span id="totalQuestions">
                                        10
                                    </span>
                                </h5>

                            </div>

                            <!-- PROGRESS -->
                            <div class="progress-wrapper">

                                <div class="progress">

                                    <div
                                        class="progress-bar bg-warning"
                                        id="quizProgress"
                                        style="width:10%;">

                                    </div>

                                </div>

                            </div>

                        </div>

                        <!-- IMAGE -->
                        <div
                            id="questionImageContainer"
                            class="question-image-container d-none">

                            <img
                                id="questionImage"
                                src=""
                                class="img-fluid rounded-4"
                                alt="Question Image"
                            >

                        </div>

                        <!-- QUESTION -->
                        <div class="question-area">

                            <h3
                                class="fw-bold mb-4"
                                id="questionText">

                                Loading question...

                            </h3>

                            <!-- OPTIONS -->
                            <div id="optionsContainer">

                            </div>

                        </div>

                        <!-- FOOTER -->
                        <div class="quiz-footer">

                            <button
                                class="btn btn-outline-secondary px-4"
                                id="prevBtn">

                                <i class="bi bi-arrow-left"></i>
                                Previous

                            </button>

                            <button
                                class="btn btn-warning px-4 fw-semibold"
                                id="nextBtn">

                                Next
                                <i class="bi bi-arrow-right"></i>

                            </button>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- SUBMIT MODAL -->
    <div class="modal fade"
        id="submitModal"
        tabindex="-1">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content border-0 rounded-4">

                <div class="modal-body text-center p-5">

                    <div class="submit-icon mb-4">

                        <i class="bi bi-check-circle-fill"></i>

                    </div>

                    <h3 class="fw-bold mb-3">
                        Submit Quiz?
                    </h3>

                    <p class="text-muted">
                        You are about to finish this quiz session.
                    </p>

                    <div class="d-flex gap-3 justify-content-center mt-4">

                        <button
                            class="btn btn-outline-secondary px-4"
                            data-bs-dismiss="modal">

                            Cancel

                        </button>

                        <button
                            class="btn btn-warning px-4 fw-semibold"
                            id="submitQuizBtn">

                            Submit Quiz

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <div class="mobile-bottom-nav d-lg-none">
        <a href="dashboard.html">
            <i class="bi bi-grid-fill"></i>
            <span>Dashboard</span>
        </a>
        <a href="quiz.html" class="active">
            <i class="bi bi-controller"></i>
            <span>Quiz</span>
        </a>
        <a href="flashcards.html">
            <i class="bi bi-stack"></i>
            <span>Flashcards</span>
        </a>
        <a href="history.html">
            <i class="bi bi-clock-history"></i>
            <span>History</span>
        </a>
        <a href="settings.html">
            <i class="bi bi-gear-fill"></i>
            <span>Settings</span>
        </a>
    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/timer.js"></script>
    <script src="assets/js/quiz.js"></script>

</body>
</html>
