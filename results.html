<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Results - QuizMaster Pro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="results-body">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark shadow-sm">

        <div class="container">

            <a href="dashboard.html"
                class="navbar-brand fw-bold">

                <i class="bi bi-patch-question-fill text-warning"></i>
                QuizMaster Pro

            </a>

            <a href="dashboard.html"
                class="btn btn-warning fw-semibold">

                <i class="bi bi-grid-fill"></i>
                Dashboard

            </a>

        </div>

    </nav>

    <!-- RESULTS -->
    <section class="results-section">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-lg-8">

                    <div class="results-card">

                        <!-- TOP -->
                        <div class="text-center">

                            <div
                                class="result-icon"
                                id="resultIcon">

                                <i class="bi bi-trophy-fill"></i>

                            </div>

                            <h1 class="fw-bold mt-4"
                                id="resultTitle">

                                Great Job!

                            </h1>

                            <p class="text-muted"
                                id="resultMessage">

                                You completed the quiz successfully.
                            </p>

                        </div>

                        <!-- SCORE -->
                        <div class="score-circle-wrapper">

                            <div class="score-circle">

                                <h1 id="scorePercentage">
                                    0%
                                </h1>

                                <small class="text-muted">
                                    Final Score
                                </small>

                            </div>

                        </div>

                        <!-- STATS -->
                        <div class="row g-4 mt-2">

                            <!-- CORRECT -->
                            <div class="col-md-4">

                                <div class="result-stat-card">

                                    <div class="stat-result-icon bg-success">

                                        <i class="bi bi-check-circle-fill"></i>

                                    </div>

                                    <h3 class="fw-bold mt-3"
                                        id="correctAnswers">

                                        0

                                    </h3>

                                    <p class="text-muted mb-0">
                                        Correct Answers
                                    </p>

                                </div>

                            </div>

                            <!-- TOTAL -->
                            <div class="col-md-4">

                                <div class="result-stat-card">

                                    <div class="stat-result-icon bg-primary">

                                        <i class="bi bi-question-circle-fill"></i>

                                    </div>

                                    <h3 class="fw-bold mt-3"
                                        id="totalQuestionsResult">

                                        0

                                    </h3>

                                    <p class="text-muted mb-0">
                                        Total Questions
                                    </p>

                                </div>

                            </div>

                            <!-- WRONG -->
                            <div class="col-md-4">

                                <div class="result-stat-card">

                                    <div class="stat-result-icon bg-danger">

                                        <i class="bi bi-x-circle-fill"></i>

                                    </div>

                                    <h3 class="fw-bold mt-3"
                                        id="wrongAnswers">

                                        0

                                    </h3>

                                    <p class="text-muted mb-0">
                                        Wrong Answers
                                    </p>

                                </div>

                            </div>

                        </div>

                        <!-- PROGRESS -->
                        <div class="mt-5">

                            <div class="d-flex justify-content-between mb-2">

                                <span class="fw-semibold">
                                    Performance
                                </span>

                                <span id="performanceText">
                                    0%
                                </span>

                            </div>

                            <div class="progress result-progress">

                                <div
                                    class="progress-bar"
                                    id="resultProgressBar"
                                    style="width:0%;">

                                </div>

                            </div>

                        </div>

                        <!-- ACTIONS -->
                        <div class="row g-3 mt-5">

                            <div class="col-md-4">

                                <a href="quiz.html"
                                    class="btn btn-warning w-100 py-3 fw-semibold">

                                    <i class="bi bi-arrow-repeat"></i>
                                    Replay Quiz

                                </a>

                            </div>

                            <div class="col-md-4">

                                <a href="history.html"
                                    class="btn btn-outline-dark w-100 py-3">

                                    <i class="bi bi-clock-history"></i>
                                    History

                                </a>

                            </div>

                            <div class="col-md-4">

                                <a href="dashboard.html"
                                    class="btn btn-primary w-100 py-3">

                                    <i class="bi bi-grid-fill"></i>
                                    Dashboard

                                </a>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <div class="mobile-bottom-nav d-lg-none">
        <a href="dashboard.html">
            <i class="bi bi-grid-fill"></i>
            <span>Dashboard</span>
        </a>
        <a href="quiz.html">
            <i class="bi bi-controller"></i>
            <span>Quiz</span>
        </a>
        <a href="flashcards.html">
            <i class="bi bi-stack"></i>
            <span>Flashcards</span>
        </a>
        <a href="history.html">
            <i class="bi bi-clock-history"></i>
            <span>History</span>
        </a>
        <a href="settings.html">
            <i class="bi bi-gear-fill"></i>
            <span>Settings</span>
        </a>
    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->
    <script src="assets/js/results.js"></script>

</body>
</html>
