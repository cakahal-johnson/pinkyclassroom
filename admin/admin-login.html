<!-- admin/admin-login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Login - Quiz App</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../index.html">
                <i class="bi bi-shield-lock-fill me-2"></i>Quiz Admin Panel
            </a>

            <div class="ms-auto">
                <a href="../index.html" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-house-door me-1"></i>Back to Home
                </a>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <section class="min-vh-100 d-flex align-items-center py-5">
        <div class="container">
            <div class="row justify-content-center">

                <div class="col-lg-5 col-md-7">

                    <!-- Card -->
                    <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

                        <!-- Header -->
                        <div class="bg-primary text-white text-center p-4">
                            <div class="mb-3">
                                <i class="bi bi-person-lock display-4"></i>
                            </div>

                            <h2 class="fw-bold mb-1">Admin Login</h2>
                            <p class="mb-0 text-white-50">
                                Access the quiz management dashboard
                            </p>
                        </div>

                        <!-- Body -->
                        <div class="card-body p-4 p-lg-5">

                            <!-- Alert -->
                            <div id="loginAlert"></div>

                            <!-- Login Form -->
                            <form id="adminLoginForm">

                                <!-- Email -->
                                <div class="mb-4">
                                    <label class="form-label fw-semibold">
                                        Email Address
                                    </label>

                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="bi bi-envelope"></i>
                                        </span>

                                        <input
                                            type="email"
                                            class="form-control"
                                            id="adminEmail"
                                            placeholder="Enter admin email"
                                            required
                                        >
                                    </div>
                                </div>

                                <!-- Password -->
                                <div class="mb-4">
                                    <label class="form-label fw-semibold">
                                        Password
                                    </label>

                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="bi bi-lock"></i>
                                        </span>

                                        <input
                                            type="password"
                                            class="form-control"
                                            id="adminPassword"
                                            placeholder="Enter password"
                                            required
                                        >

                                        <button
                                            class="btn btn-outline-secondary"
                                            type="button"
                                            id="togglePassword"
                                        >
                                            <i class="bi bi-eye"></i>
                                        </button>
                                    </div>
                                </div>

                                <!-- Remember -->
                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <div class="form-check">
                                        <input
                                            class="form-check-input"
                                            type="checkbox"
                                            id="rememberMe"
                                        >

                                        <label class="form-check-label" for="rememberMe">
                                            Remember Me
                                        </label>
                                    </div>

                                    <a href="#" class="small text-decoration-none">
                                        Forgot Password?
                                    </a>
                                </div>

                                <!-- Login Button -->
                                <div class="d-grid mb-3">
                                    <button type="submit" class="btn btn-primary btn-lg">
                                        <i class="bi bi-box-arrow-in-right me-2"></i>
                                        Login
                                    </button>
                                </div>

                            </form>

                            <!-- Demo Credentials -->
                            <div class="alert alert-info mt-4 mb-0">
                                <h6 class="fw-bold">
                                    <i class="bi bi-info-circle me-2"></i>
                                    Demo Admin Credentials
                                </h6>

                                <small>
                                    <strong>Email:</strong> admin@quizapp.com <br>
                                    <strong>Password:</strong> admin123
                                </small>
                            </div>

                        </div>
                    </div>

                    <!-- Footer -->
                    <div class="text-center mt-4 text-muted small">
                        © 2026 Quiz App Admin Panel
                    </div>

                </div>
            </div>
        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Admin JS -->
    <script src="../assets/js/admin.js"></script>

    <script>
        // Toggle Password Visibility
        const togglePassword = document.getElementById("togglePassword");
        const passwordInput = document.getElementById("adminPassword");

        togglePassword.addEventListener("click", () => {
            const type = passwordInput.getAttribute("type") === "password"
                ? "text"
                : "password";

            passwordInput.setAttribute("type", type);

            togglePassword.innerHTML = type === "password"
                ? '<i class="bi bi-eye"></i>'
                : '<i class="bi bi-eye-slash"></i>';
        });

        // Admin Login
        const adminLoginForm = document.getElementById("adminLoginForm");

        adminLoginForm.addEventListener("submit", function(e) {
            e.preventDefault();

            const email = document.getElementById("adminEmail").value.trim();
            const password = document.getElementById("adminPassword").value.trim();

            const alertBox = document.getElementById("loginAlert");

            // Demo Admin Credentials
            const adminData = {
                email: "admin@quizapp.com",
                password: "admin123"
            };

            if (email === adminData.email && password === adminData.password) {

                // Store Admin Session
                localStorage.setItem("quizAdminLoggedIn", "true");
                localStorage.setItem("quizAdminEmail", email);

                alertBox.innerHTML = `
                    <div class="alert alert-success alert-dismissible fade show">
                        <i class="bi bi-check-circle-fill me-2"></i>
                        Login successful! Redirecting...
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;

                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1500);

            } else {

                alertBox.innerHTML = `
                    <div class="alert alert-danger alert-dismissible fade show">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        Invalid admin credentials.
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;
            }
        });
    </script>

</body>
</html>
