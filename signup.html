<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Sign Up - QuizMaster Pro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="auth-body">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">

            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-patch-question-fill text-warning"></i>
                QuizMaster Pro
            </a>

            <div class="ms-auto">
                <a href="login.html" class="btn btn-outline-light btn-sm">
                    Login
                </a>
            </div>

        </div>
    </nav>

    <!-- SIGNUP -->
    <section class="auth-section">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-lg-6 col-md-8">

                    <div class="auth-card">

                        <!-- TOP -->
                        <div class="text-center mb-4">

                            <div class="auth-icon signup-icon">
                                <i class="bi bi-person-plus-fill"></i>
                            </div>

                            <h2 class="fw-bold mt-3">
                                Create Account
                            </h2>

                            <p class="text-muted">
                                Start your smart learning experience
                            </p>

                        </div>

                        <!-- ALERT -->
                        <div id="signupAlert"></div>

                        <!-- FORM -->
                        <form id="signupForm">

                            <!-- NAME -->
                            <div class="mb-3">

                                <label class="form-label fw-semibold">
                                    Full Name
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">
                                        <i class="bi bi-person-fill"></i>
                                    </span>

                                    <input
                                        type="text"
                                        id="signupName"
                                        class="form-control"
                                        placeholder="Enter full name"
                                        required
                                    >

                                </div>

                            </div>

                            <!-- EMAIL -->
                            <div class="mb-3">

                                <label class="form-label fw-semibold">
                                    Email Address
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">
                                        <i class="bi bi-envelope-fill"></i>
                                    </span>

                                    <input
                                        type="email"
                                        id="signupEmail"
                                        class="form-control"
                                        placeholder="Enter email"
                                        required
                                    >

                                </div>

                            </div>

                            <!-- PASSWORD -->
                            <div class="mb-3">

                                <label class="form-label fw-semibold">
                                    Password
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">
                                        <i class="bi bi-lock-fill"></i>
                                    </span>

                                    <input
                                        type="password"
                                        id="signupPassword"
                                        class="form-control"
                                        placeholder="Create password"
                                        required
                                    >

                                    <button
                                        type="button"
                                        class="btn btn-outline-secondary"
                                        id="toggleSignupPassword">

                                        <i class="bi bi-eye-fill"></i>

                                    </button>

                                </div>

                                <small class="text-muted">
                                    Minimum 6 characters
                                </small>

                            </div>

                            <!-- CONFIRM -->
                            <div class="mb-4">

                                <label class="form-label fw-semibold">
                                    Confirm Password
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">
                                        <i class="bi bi-shield-lock-fill"></i>
                                    </span>

                                    <input
                                        type="password"
                                        id="signupConfirmPassword"
                                        class="form-control"
                                        placeholder="Confirm password"
                                        required
                                    >

                                </div>

                            </div>

                            <!-- TERMS -->
                            <div class="form-check mb-4">

                                <input
                                    class="form-check-input"
                                    type="checkbox"
                                    id="agreeTerms"
                                    required
                                >

                                <label class="form-check-label">
                                    I agree to the
                                    <a href="#" class="text-decoration-none">
                                        Terms & Conditions
                                    </a>
                                </label>

                            </div>

                            <!-- BUTTON -->
                            <button
                                type="submit"
                                class="btn btn-warning w-100 fw-semibold py-2">

                                <i class="bi bi-person-check-fill"></i>
                                Create Account

                            </button>

                        </form>

                        <!-- DIVIDER -->
                        <div class="auth-divider">
                            <span>OR</span>
                        </div>

                        <!-- SOCIAL -->
                        <div class="row g-2">

                            <div class="col-6">
                                <button class="btn btn-outline-dark w-100">
                                    <i class="bi bi-google"></i>
                                    Google
                                </button>
                            </div>

                            <div class="col-6">
                                <button class="btn btn-outline-primary w-100">
                                    <i class="bi bi-facebook"></i>
                                    Facebook
                                </button>
                            </div>

                        </div>

                        <!-- FOOT -->
                        <div class="text-center mt-4">

                            <p class="mb-0">

                                Already have an account?

                                <a href="login.html"
                                    class="text-decoration-none fw-semibold">

                                    Login

                                </a>

                            </p>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Auth -->
    <script src="assets/js/auth.js"></script>

</body>
</html>
