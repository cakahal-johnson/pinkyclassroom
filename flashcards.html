<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards - QuizMaster Pro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="flashcards-body">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

        <div class="container">

            <a href="dashboard.html"
                class="navbar-brand fw-bold">

                <i class="bi bi-patch-question-fill text-warning"></i>
                QuizMaster Pro

            </a>

            <div class="d-flex gap-2">

                <a href="quiz.html"
                    class="btn btn-warning btn-sm fw-semibold">

                    <i class="bi bi-controller"></i>
                    Start Quiz

                </a>

                <a href="dashboard.html"
                    class="btn btn-outline-light btn-sm">

                    <i class="bi bi-grid-fill"></i>
                    Dashboard

                </a>

            </div>

        </div>

    </nav>

    <!-- SECTION -->
    <section class="flashcards-section">

        <div class="container">

            <!-- HEADER -->
            <div class="flashcards-top">

                <div>

                    <h2 class="fw-bold mb-1">
                        Smart Flashcards
                    </h2>

                    <p class="text-muted mb-0">
                        Flip cards and revise important concepts quickly
                    </p>

                </div>

                <div class="flashcards-badge">

                    <i class="bi bi-lightning-fill"></i>
                    Quick Revision

                </div>

            </div>

            <!-- STATS -->
            <div class="row g-4 mt-2 mb-5">

                <div class="col-md-4">

                    <div class="flash-stat-card">

                        <div class="flash-stat-icon bg-primary">

                            <i class="bi bi-stack"></i>

                        </div>

                        <div>

                            <h3 class="fw-bold mb-0"
                                id="totalFlashcards">

                                0

                            </h3>

                            <small class="text-muted">
                                Flashcards
                            </small>

                        </div>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="flash-stat-card">

                        <div class="flash-stat-icon bg-success">

                            <i class="bi bi-check-circle-fill"></i>

                        </div>

                        <div>

                            <h3 class="fw-bold mb-0"
                                id="reviewedCards">

                                0

                            </h3>

                            <small class="text-muted">
                                Reviewed
                            </small>

                        </div>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="flash-stat-card">

                        <div class="flash-stat-icon bg-warning">

                            <i class="bi bi-arrow-repeat"></i>

                        </div>

                        <div>

                            <h3 class="fw-bold mb-0"
                                id="remainingCards">

                                0

                            </h3>

                            <small class="text-muted">
                                Remaining
                            </small>

                        </div>

                    </div>

                </div>

            </div>

            <!-- FLASHCARD -->
            <div class="row justify-content-center">

                <div class="col-lg-8">

                    <div class="flashcard-wrapper">

                        <!-- CARD -->
                        <div class="flashcard-box"
                            id="flashcard">

                            <!-- FRONT -->
                            <div class="flashcard-face flashcard-front">

                                <div class="flashcard-content">

                                    <span class="flashcard-label">
                                        Question
                                    </span>

                                    <h2 id="flashQuestion">

                                        Loading...

                                    </h2>

                                    <div class="flashcard-hint">

                                        <i class="bi bi-arrow-repeat"></i>
                                        Click to flip

                                    </div>

                                </div>

                            </div>

                            <!-- BACK -->
                            <div class="flashcard-face flashcard-back">

                                <div class="flashcard-content">

                                    <span class="flashcard-label">
                                        Answer
                                    </span>

                                    <h2 id="flashAnswer">

                                        Answer

                                    </h2>

                                    <div class="flashcard-hint">

                                        <i class="bi bi-arrow-repeat"></i>
                                        Click to flip back

                                    </div>

                                </div>

                            </div>

                        </div>

                    </div>

                    <!-- CONTROLS -->
                    <div class="flashcard-controls">

                        <button
                            class="btn btn-outline-secondary px-4"
                            id="prevFlashcard">

                            <i class="bi bi-arrow-left"></i>
                            Previous

                        </button>

                        <div class="flashcard-progress">

                            Card

                            <span id="currentFlashcard">
                                1
                            </span>

                            of

                            <span id="flashcardCount">
                                1
                            </span>

                        </div>

                        <button
                            class="btn btn-warning px-4 fw-semibold"
                            id="nextFlashcard">

                            Next
                            <i class="bi bi-arrow-right"></i>

                        </button>

                    </div>

                    <!-- ACTIONS -->
                    <div class="flashcard-actions mt-4">

                        <button
                            class="btn btn-success"
                            id="markKnownBtn">

                            <i class="bi bi-check-lg"></i>
                            Mark as Known

                        </button>

                        <button
                            class="btn btn-danger"
                            id="markReviewBtn">

                            <i class="bi bi-bookmark-fill"></i>
                            Review Again

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <div class="mobile-bottom-nav d-lg-none">
        <a href="dashboard.html">
            <i class="bi bi-grid-fill"></i>
            <span>Dashboard</span>
        </a>
        <a href="quiz.html">
            <i class="bi bi-controller"></i>
            <span>Quiz</span>
        </a>
        <a href="flashcards.html" class="active">
            <i class="bi bi-stack"></i>
            <span>Flashcards</span>
        </a>
        <a href="history.html">
            <i class="bi bi-clock-history"></i>
            <span>History</span>
        </a>
        <a href="settings.html">
            <i class="bi bi-gear-fill"></i>
            <span>Settings</span>
        </a>
    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/flashcards.js"></script>

</body>
</html>
