<!-- admin/upload-question.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Upload Questions - Quiz Admin</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="bg-light">

    <div class="d-flex">

        <!-- Sidebar -->
        <aside class="bg-dark text-white p-3 vh-100 position-fixed"
               style="width: 260px; overflow-y: auto;">

            <div class="text-center mb-4">
                <h3 class="fw-bold">
                    <i class="bi bi-shield-lock-fill me-2"></i>
                    Admin Panel
                </h3>

                <small class="text-white-50">
                    Quiz Management
                </small>
            </div>

            <hr class="border-secondary">

            <!-- Navigation -->
            <ul class="nav flex-column gap-2">

                <li class="nav-item">
                    <a href="dashboard.html"
                       class="nav-link text-white">
                        <i class="bi bi-speedometer2 me-2"></i>
                        Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a href="upload-question.html"
                       class="nav-link active bg-primary text-white rounded">
                        <i class="bi bi-cloud-upload me-2"></i>
                        Upload Questions
                    </a>
                </li>

                <li class="nav-item">
                    <a href="manage-questions.html"
                       class="nav-link text-white">
                        <i class="bi bi-ui-checks-grid me-2"></i>
                        Manage Questions
                    </a>
                </li>

                <li class="nav-item">
                    <a href="upload-flashcard.html"
                       class="nav-link text-white">
                        <i class="bi bi-journal-plus me-2"></i>
                        Upload Flashcards
                    </a>
                </li>

                <li class="nav-item">
                    <a href="manage-flashcard.html"
                       class="nav-link text-white">
                        <i class="bi bi-journals me-2"></i>
                        Manage Flashcards
                    </a>
                </li>

            </ul>

            <!-- Logout -->
            <div class="position-absolute bottom-0 start-0 w-100 p-3">

                <hr class="border-secondary">

                <button id="logoutBtn"
                        class="btn btn-danger w-100">
                    <i class="bi bi-box-arrow-right me-2"></i>
                    Logout
                </button>

            </div>

        </aside>

        <!-- Main Content -->
        <main class="flex-grow-1"
              style="margin-left: 260px;">

            <!-- Topbar -->
            <div class="bg-white shadow-sm p-3 px-4 d-flex justify-content-between align-items-center">

                <div>
                    <h4 class="fw-bold mb-0">
                        Upload Quiz Questions
                    </h4>

                    <small class="text-muted">
                        Add single or multiple choice quiz questions
                    </small>
                </div>

                <a href="manage-questions.html"
                   class="btn btn-outline-primary">
                    <i class="bi bi-ui-checks-grid me-2"></i>
                    Manage Questions
                </a>

            </div>

            <!-- Content -->
            <div class="container-fluid p-4">

                <!-- Alert -->
                <div id="uploadAlert"></div>

                <!-- Form Card -->
                <div class="card border-0 shadow-sm rounded-4">

                    <div class="card-header bg-white border-0 p-4">
                        <h5 class="fw-bold mb-0">
                            Question Details
                        </h5>
                    </div>

                    <div class="card-body p-4">

                        <form id="questionForm">

                            <div class="row">

                                <!-- Left Side -->
                                <div class="col-lg-8">

                                    <!-- Category -->
                                    <div class="mb-4">
                                        <label class="form-label fw-semibold">
                                            Quiz Category
                                        </label>

                                        <select class="form-select"
                                                id="category"
                                                required>

                                            <option value="">
                                                Select Category
                                            </option>

                                            <option value="Mathematics">
                                                Mathematics
                                            </option>

                                            <option value="Science">
                                                Science
                                            </option>

                                            <option value="English">
                                                English
                                            </option>

                                            <option value="Technology">
                                                Technology
                                            </option>

                                            <option value="General Knowledge">
                                                General Knowledge
                                            </option>

                                        </select>
                                    </div>

                                    <!-- Difficulty -->
                                    <div class="mb-4">
                                        <label class="form-label fw-semibold">
                                            Difficulty Level
                                        </label>

                                        <select class="form-select"
                                                id="difficulty"
                                                required>

                                            <option value="">
                                                Select Difficulty
                                            </option>

                                            <option value="Easy">
                                                Easy
                                            </option>

                                            <option value="Medium">
                                                Medium
                                            </option>

                                            <option value="Hard">
                                                Hard
                                            </option>

                                        </select>
                                    </div>

                                    <!-- Question -->
                                    <div class="mb-4">
                                        <label class="form-label fw-semibold">
                                            Question
                                        </label>

                                        <textarea class="form-control"
                                                  id="question"
                                                  rows="4"
                                                  placeholder="Enter quiz question..."
                                                  required></textarea>
                                    </div>

                                    <!-- Question Image -->
                                    <div class="mb-4">
                                        <label class="form-label fw-semibold">
                                            Question Image (Optional)
                                        </label>

                                        <input type="file"
                                               class="form-control"
                                               id="questionImage"
                                               accept="image/*">

                                        <small class="text-muted">
                                            JPG, PNG, WEBP supported
                                        </small>
                                    </div>

                                </div>

                                <!-- Right Side -->
                                <div class="col-lg-4">

                                    <div class="card bg-light border-0 rounded-4">

                                        <div class="card-body">

                                            <h6 class="fw-bold mb-3">
                                                Question Settings
                                            </h6>

                                            <!-- Question Type -->
                                            <div class="mb-4">

                                                <label class="form-label fw-semibold">
                                                    Question Type
                                                </label>

                                                <select class="form-select"
                                                        id="questionType"
                                                        required>

                                                    <option value="single">
                                                        Single Answer
                                                    </option>

                                                    <option value="multiple">
                                                        Multiple Answers
                                                    </option>

                                                </select>

                                            </div>

                                            <!-- Timer -->
                                            <div class="mb-4">

                                                <label class="form-label fw-semibold">
                                                    Time Limit (Seconds)
                                                </label>

                                                <input type="number"
                                                       class="form-control"
                                                       id="timer"
                                                       value="30"
                                                       min="5"
                                                       max="300">

                                            </div>

                                            <!-- Marks -->
                                            <div class="mb-4">

                                                <label class="form-label fw-semibold">
                                                    Marks
                                                </label>

                                                <input type="number"
                                                       class="form-control"
                                                       id="marks"
                                                       value="1"
                                                       min="1">

                                            </div>

                                        </div>

                                    </div>

                                </div>

                            </div>

                            <!-- Options -->
                            <div class="card bg-light border-0 rounded-4 mt-4">

                                <div class="card-body">

                                    <div class="d-flex justify-content-between align-items-center mb-4">

                                        <h5 class="fw-bold mb-0">
                                            Answer Options
                                        </h5>

                                        <button type="button"
                                                class="btn btn-sm btn-primary"
                                                id="addOptionBtn">

                                            <i class="bi bi-plus-circle me-1"></i>
                                            Add Option
                                        </button>

                                    </div>

                                    <div id="optionsContainer">

                                        <!-- Option 1 -->
                                        <div class="option-item border rounded-3 p-3 mb-3">

                                            <div class="row align-items-center">

                                                <div class="col-md-1">

                                                    <div class="form-check">
                                                        <input class="form-check-input correctAnswer"
                                                               type="radio"
                                                               name="correctAnswer"
                                                               checked>
                                                    </div>

                                                </div>

                                                <div class="col-md-10">

                                                    <input type="text"
                                                           class="form-control optionInput"
                                                           placeholder="Enter option..."
                                                           required>

                                                </div>

                                                <div class="col-md-1 text-end">

                                                    <button type="button"
                                                            class="btn btn-danger removeOption">

                                                        <i class="bi bi-trash"></i>

                                                    </button>

                                                </div>

                                            </div>

                                        </div>

                                        <!-- Option 2 -->
                                        <div class="option-item border rounded-3 p-3 mb-3">

                                            <div class="row align-items-center">

                                                <div class="col-md-1">

                                                    <div class="form-check">
                                                        <input class="form-check-input correctAnswer"
                                                               type="radio"
                                                               name="correctAnswer">
                                                    </div>

                                                </div>

                                                <div class="col-md-10">

                                                    <input type="text"
                                                           class="form-control optionInput"
                                                           placeholder="Enter option..."
                                                           required>

                                                </div>

                                                <div class="col-md-1 text-end">

                                                    <button type="button"
                                                            class="btn btn-danger removeOption">

                                                        <i class="bi bi-trash"></i>

                                                    </button>

                                                </div>

                                            </div>

                                        </div>

                                    </div>

                                </div>

                            </div>

                            <!-- Submit -->
                            <div class="d-flex justify-content-end mt-4 gap-3">

                                <button type="reset"
                                        class="btn btn-outline-secondary px-4">

                                    <i class="bi bi-arrow-counterclockwise me-2"></i>
                                    Reset
                                </button>

                                <button type="submit"
                                        class="btn btn-primary px-5">

                                    <i class="bi bi-cloud-upload me-2"></i>
                                    Save Question
                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </main>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Admin Script -->
    <script>

        // Authentication Check
        const isAdminLoggedIn = localStorage.getItem("quizAdminLoggedIn");

        if (!isAdminLoggedIn) {
            window.location.href = "admin-login.html";
        }

        // Logout
        document.getElementById("logoutBtn")
            .addEventListener("click", () => {

                localStorage.removeItem("quizAdminLoggedIn");
                localStorage.removeItem("quizAdminEmail");

                window.location.href = "admin-login.html";
            });

        // Add New Option
        const addOptionBtn = document.getElementById("addOptionBtn");
        const optionsContainer = document.getElementById("optionsContainer");

        addOptionBtn.addEventListener("click", () => {

            const optionDiv = document.createElement("div");

            optionDiv.classList.add(
                "option-item",
                "border",
                "rounded-3",
                "p-3",
                "mb-3"
            );

            optionDiv.innerHTML = `
                <div class="row align-items-center">

                    <div class="col-md-1">

                        <div class="form-check">
                            <input class="form-check-input correctAnswer"
                                   type="radio"
                                   name="correctAnswer">
                        </div>

                    </div>

                    <div class="col-md-10">

                        <input type="text"
                               class="form-control optionInput"
                               placeholder="Enter option..."
                               required>

                    </div>

                    <div class="col-md-1 text-end">

                        <button type="button"
                                class="btn btn-danger removeOption">

                            <i class="bi bi-trash"></i>

                        </button>

                    </div>

                </div>
            `;

            optionsContainer.appendChild(optionDiv);

        });

        // Remove Option
        document.addEventListener("click", function(e) {

            if (e.target.closest(".removeOption")) {

                const allOptions = document.querySelectorAll(".option-item");

                if (allOptions.length > 2) {
                    e.target.closest(".option-item").remove();
                } else {
                    alert("Minimum 2 options required.");
                }

            }

        });

        // Question Type Toggle
        document.getElementById("questionType")
            .addEventListener("change", function() {

                const type = this.value;
                const correctAnswers =
                    document.querySelectorAll(".correctAnswer");

                correctAnswers.forEach(input => {

                    input.type =
                        type === "multiple"
                        ? "checkbox"
                        : "radio";

                    input.name =
                        type === "multiple"
                        ? ""
                        : "correctAnswer";
                });

            });

        // Save Question
        document.getElementById("questionForm")
            .addEventListener("submit", function(e) {

                e.preventDefault();

                const category =
                    document.getElementById("category").value;

                const difficulty =
                    document.getElementById("difficulty").value;

                const question =
                    document.getElementById("question").value;

                const questionType =
                    document.getElementById("questionType").value;

                const timer =
                    document.getElementById("timer").value;

                const marks =
                    document.getElementById("marks").value;

                const optionInputs =
                    document.querySelectorAll(".optionInput");

                const correctInputs =
                    document.querySelectorAll(".correctAnswer");

                const options = [];
                const correctAnswers = [];

                optionInputs.forEach((input, index) => {

                    options.push(input.value);

                    if (correctInputs[index].checked) {
                        correctAnswers.push(input.value);
                    }

                });

                // Validation
                if (correctAnswers.length === 0) {

                    document.getElementById("uploadAlert").innerHTML = `
                        <div class="alert alert-danger">
                            Please select at least one correct answer.
                        </div>
                    `;

                    return;
                }

                // Image Handling
                const imageFile =
                    document.getElementById("questionImage").files[0];

                const reader = new FileReader();

                reader.onload = function() {

                    const imageData = imageFile
                        ? reader.result
                        : "";

                    const questionData = {
                        id: Date.now(),
                        category,
                        difficulty,
                        question,
                        questionType,
                        timer,
                        marks,
                        options,
                        correctAnswers,
                        image: imageData,
                        createdAt: new Date().toLocaleString()
                    };

                    // Save to LocalStorage
                    const existingQuestions =
                        JSON.parse(
                            localStorage.getItem("quizQuestions")
                        ) || [];

                    existingQuestions.push(questionData);

                    localStorage.setItem(
                        "quizQuestions",
                        JSON.stringify(existingQuestions)
                    );

                    // Success Alert
                    document.getElementById("uploadAlert").innerHTML = `
                        <div class="alert alert-success alert-dismissible fade show">
                            <i class="bi bi-check-circle-fill me-2"></i>
                            Question uploaded successfully!
                            <button type="button"
                                    class="btn-close"
                                    data-bs-dismiss="alert"></button>
                        </div>
                    `;

                    // Reset Form
                    document.getElementById("questionForm").reset();

                };

                if (imageFile) {
                    reader.readAsDataURL(imageFile);
                } else {
                    reader.onload();
                }

            });

    </script>

</body>
</html>
